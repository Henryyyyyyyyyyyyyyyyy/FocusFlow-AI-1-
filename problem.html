<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>為什麼需要 FocusFlow？ | 能量管理科學</title>
    <style>
        :root {
            --bg: #000000;
            --text: #f5f5f7;
            --text-muted: #86868b;
            --accent: #2997ff;
            --glass: rgba(22, 22, 23, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "PingFang TC", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Apple 毛玻璃導覽列 */
        .navbar {
            position: fixed;
            top: 0; width: 100%; height: 48px;
            background: var(--glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            z-index: 1000;
            display: flex; justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-content {
            width: 100%; max-width: 1000px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-size: 13px;
        }

        .nav-content a { color: var(--text); text-decoration: none; opacity: 0.8; transition: 0.3s; }
        .nav-content a:hover { opacity: 1; color: var(--accent); }

        /* 捲動動畫特效 */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1.2s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .section { padding: 120px 20px; max-width: 1100px; margin: 0 auto; }

        /* 標題設計 */
        .title-group { text-align: center; margin-bottom: 80px; }
        .title-group h1 {
            font-size: clamp(40px, 8vw, 72px);
            font-weight: 700; letter-spacing: -0.02em;
            background: linear-gradient(180deg, #fff 0%, #86868b 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* 痛點卡片設計 (Apple 卡片流) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: #111112; border-radius: 30px; padding: 50px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.4s ease;
            text-align: left;
        }

        .card:hover { 
            border-color: var(--accent); 
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card h3 { font-size: 28px; margin-bottom: 15px; color: #fff; font-weight: 600; }
        .card p { font-size: 17px; color: var(--text-muted); line-height: 1.6; }
        
        .tag {
            font-size: 12px; font-weight: 700; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 10px;
        }

        .btn {
            background: var(--text); color: var(--bg);
            padding: 16px 36px; border-radius: 980px;
            font-size: 17px; font-weight: 600; text-decoration: none;
            transition: 0.3s; display: inline-block;
            margin-top: 60px;
        }
        .btn:hover { transform: scale(1.05); background: #fff; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">

                <a href="index.html">返回首頁</a>
                <a href="faq.html">常見問題</a>
            </div>
        </div>
    </nav>

            </p>
        </div>

            </div>

                <span class="tag">Problem 02</span>
