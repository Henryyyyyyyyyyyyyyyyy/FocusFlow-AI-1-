    <section class="section fade-in" style="padding-top: 120px;">
        <h2 style="font-size: 48px; margin-bottom: 20px;">為什麼我們越來越累？</h2>
        <p style="margin-bottom: 60px;">長期處於「認知過載」與沒有精力的狀態，是效率低下的根本原因。</p>

        <div class="grid">
            <div class="card">
                <h3 style="color: #d73a49;">拖延症</h3>
                <p>當任務過於複雜，大腦會預期高耗能而產生抗拒，轉向滑手機等低耗能補償行為。</p>
            </div>
            <div class="card">
                <h3 style="color: #d73a49;">心情低落</h3>
                <p>精力耗盡導致情緒韌性下降，產生的「情緒餘波」會持續吞噬高效工作的可能性。</p>
            </div>
            <div class="card">
                <h3 style="color: #d73a49;">專注力下降</h3>
                <p>疲勞使大腦進入節能模式，導致頻繁分心，重新進入狀態的切換成本極高。</p>
            </div>
            <div class="card">
                <h3 style="color: #d73a49;">決策疲勞</h3>
                <p>在資訊碎片化時代，判斷「現在該做什麼」本身就是最消耗能量的行為。</p>
            </div>
        </div>

        <div style="margin-top: 80px;">
            <p style="font-size: 22px; font-weight: 500;">這就是我們要解決的問題。</p>
            <a href="index.html#features" class="btn" style="margin-top: 20px;">看看解決方案</a>
        </div>
    </section>
