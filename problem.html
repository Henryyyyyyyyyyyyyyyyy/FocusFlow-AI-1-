<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認知過載與痛點 - FocusFlow</title>
    <style>
        :root { --bg: #000; --text: #f5f5f7; --text-m: #86868b; --accent: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-top: 100px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 56px; margin-bottom: 60px; text-align: center; }
        .card { background: #111; padding: 40px; border-radius: 24px; margin-bottom: 30px; border-left: 4px solid var(--accent); }
        h2 { font-size: 32px; margin-bottom: 15px; }
        p { font-size: 20px; color: var(--text-m); line-height: 1.6; }
        .nav-back { position: fixed; top: 20px; left: 20px; color: var(--text); text-decoration: none; font-size: 14px; opacity: 0.6; }
    </style>
</head>
<body>
    <a href="index.html" class="nav-back">← 返回首頁</a>
    <div class="container">
        <h1>為什麼我們越來越累？</h1>
        <div class="card">
            <h2>認知過載 (Cognitive Overload)</h2>
            <p>資訊碎片的轟炸讓大腦長期處於「節能模式」。當訊息處理能力下降，即使是簡單的決策也會變得異常沉重。</p>
        </div>
        <div class="card">
            <h2>拖延症的真相</h2>
            <p>這不是懶惰，而是保護機制。當任務過於龐大，大腦會預期高耗能而產生抗拒，強迫你轉向滑手機等低耗能行為。</p>
        </div>
        <div class="card" style="border-left-color: #34c759;">
            <h2>決策疲勞</h2>
            <p>在清單中挑選「該做什麼」本身就在消耗你僅存的電力。FocusFlow 的目標就是消滅這個過程。</p>
        </div>
    </div>
</body>
</html>
