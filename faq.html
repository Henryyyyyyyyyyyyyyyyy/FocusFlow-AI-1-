<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常見問題 - FocusFlow</title>
    <style>
        :root { --bg: #000; --text: #f5f5f7; --accent: #2997ff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding-top: 80px; }
        .container { width: 100%; max-width: 700px; padding: 20px; }
        h1 { font-size: 48px; margin-bottom: 50px; }
        .q { font-size: 22px; font-weight: 600; color: var(--accent); margin-top: 40px; }
        .a { font-size: 18px; color: #86868b; margin-top: 10px; line-height: 1.6; padding-bottom: 20px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="color:#fff; text-decoration:none; opacity:0.5;">← 返回</a>
        <h1>常見問題</h1>
        
        <div class="q">這與一般排程 App 有何不同？</div>
        <div class="a">傳統工具依賴「自律」，而 FocusFlow 依賴「科學」。我們透過 AI 降阻引擎解決「不想動」的心理空缺，而非只是在日曆上填滿顏色。</div>

        <div class="q">我需要輸入很多資料嗎？</div>
        <div class="a">不。為了避免造成新的負擔，我們設計了「極簡輸入原則」。你只需丟出一個念頭，剩下的拆解與媒合交由 AI 處理。</div>

        <div class="q">能量管理真的有效嗎？</div>
        <div class="a">是的。在錯誤的時間做對的事，效率事倍功半。將高耗能任務安排在巔峰狀態，這就是我們「能量匹配」的核心邏輯。</div>
    </div>
</body>
</html>
