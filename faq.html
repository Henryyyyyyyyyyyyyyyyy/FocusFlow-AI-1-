<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ - FocusFlow AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" style="font-weight: 600; font-size: 16px;">FocusFlow</a>
            <div style="display:flex; gap:25px;">
                <a href="problem.html">為什麼是能量？</a>
                <a href="faq.html">常見問題</a>
            </div>
        </div>
    </nav>

    <section class="section" style="padding-top:150px;">
        <h2 class="reveal" style="text-align:center; font-size:48px; margin-bottom:60px;">常見問題</h2>
        
        <div class="faq-list">
            <div class="faq-item reveal">
                <h3>我們真正想要打造出什麼？</h3>
                <p>一個不同於以往的任務兼時間管理 App，專注於解決「有時間卻沒精力」的真實痛點。 [cite: 117, 118]</p>
            </div>
            <div class="faq-item reveal">
                <h3>使用者是否需要輸入大量資訊 AI 才能運作？</h3>
                <p>不，我們開發了輕量化 AI 策略，利用最少的資訊產出最有價值的建議，避免操作過程本末倒置。 [cite: 121]</p>
            </div>
            <div class="faq-item reveal">
                <h3>這對 ADHD 或易分心族群有幫助嗎？</h3>
                <p>是的，FocusFlow 透過任務拆解與能量安排，特別能解決「啟動困難」與「無法判斷優先順序」的執行功能痛點。 [cite: 43]</p>
            </div>
        </div>
    </section>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
