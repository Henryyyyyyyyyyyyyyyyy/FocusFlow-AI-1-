<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow AI - 重新定義專注</title>
    <style>
        :root { --bg: #000; --text: #f5f5f7; --text-m: #86868b; --accent: #2997ff; --glass: rgba(22, 22, 23, 0.8); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* 導覽列 */
        nav { position: fixed; top: 0; width: 100%; height: 48px; background: var(--glass); backdrop-filter: saturate(180%) blur(20px); z-index: 1000; display: flex; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-c { width: 100%; max-width: 1024px; display: flex; align-items: center; justify-content: space-between; padding: 0 22px; font-size: 12px; }
        .nav-c a { color: var(--text); text-decoration: none; opacity: 0.8; transition: 0.3s; }
        .nav-c a:hover { opacity: 1; color: var(--accent); }

        .reveal { opacity: 0; transform: translateY(40px); transition: 1s cubic-bezier(0.15, 0, 0.15, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Hero */
        .hero { height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: clamp(48px, 10vw, 84px); font-weight: 700; letter-spacing: -0.04em; background: linear-gradient(180deg, #fff 50%, #888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 24px; color: var(--text-m); margin-top: 20px; max-width: 700px; }

        /* 能量核心視覺 */
        .mockup-container { height: 500px; display: flex; justify-content: center; align-items: center; }
        .core-orb { width: 200px; height: 200px; background: radial-gradient(circle, var(--accent), #003366, transparent); filter: blur(30px); border-radius: 50%; animation: breathe 5s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.4); opacity: 0.8; } }

        /* Bento Grid 功能區 */
        .section { padding: 100px 22px; max-width: 1100px; margin: 0 auto; }
        .bento { display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px; }
        .b-item { background: #161617; border-radius: 28px; padding: 40px; border: 1px solid rgba(255,255,255,0.05); }
        .b-1 { grid-column: 1 / 4; } .b-2 { grid-column: 4 / 7; } .b-3 { grid-column: 1 / 7; text-align: center; }
        .b-item h3 { font-size: 28px; margin-bottom: 15px; }
        .b-item p { color: var(--text-m); font-size: 18px; }

        .cta-btn { background: var(--text); color: #000; padding: 18px 40px; border-radius: 980px; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 40px; transition: 0.3s; }
        .cta-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav><div class="nav-c">
        <a href="index.html" style="font-weight: 600; font-size: 16px;">FocusFlow</a>
        <div style="display:flex; gap:30px;">
            <a href="problem.html">痛點分析</a>
            <a href="faq.html">常見問題</a>
        </div>
    </div></nav>

    <header class="hero reveal">
        <h1>開始，不再需要意志力。</h1>
        <p>打破時間管理的迷思。當你的大腦不再感到阻礙，專注便會隨之而來。</p>
        <div class="mockup-container"><div class="core-orb"></div></div>
    </header>

    <section class="section">
        <div class="bento">
            <div class="b-item b-1 reveal">
                <h3>AI 降阻引擎</h3>
                <p>將龐大的壓力拆解為微小的步履。我們不只告訴你做什麼，更讓你「想做」。</p>
            </div>
            <div class="b-item b-2 reveal">
                <h3>能量狀態同步</h3>
                <p>透過生理節奏分析，在最巔峰的時刻，為你媒合最重要的任務。</p>
            </div>
            <div class="b-item b-3 reveal">
                <h3>「管理能量，而非時間」</h3>
                <p>這不是另一個清單工具，而是你的第二大腦，幫你過濾噪音，重拾掌控感。</p>
                <a href="problem.html" class="cta-btn">深入了解背後邏輯</a>
            </div>
        </div>
    </section>

    <script>
        const obs = new IntersectionObserver((es) => { es.forEach(e => { if (e.isIntersecting) e.target.classList.add('active'); }); }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    </script>
</body>
</html>
