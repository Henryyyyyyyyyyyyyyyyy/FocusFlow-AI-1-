<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow AI - 開始，不再需要意志力</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" style="font-weight: 600; font-size: 15px;">FocusFlow</a>
            <div style="display:flex; gap:25px;">
                <a href="#about">為什麼是能量？</a>
                <a href="#features">功能特色</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1 class="reveal">開始，不再需要意志力。</h1>
        <p class="reveal">讓對的事，在對的狀態完成。FocusFlow 用 AI 消滅開工焦慮。</p>
        <div class="mockup-container reveal">
            <div class="energy-core"></div>
            <div style="position:absolute; bottom:40px; width:100%; text-align:center; color:#555; font-size:11px; letter-spacing:1px;">
                SYNCING ENERGY...
            </div>
        </div>
    </header>

    <section id="about" class="section">
        <h2 class="reveal" style="font-size: 48px; text-align:center; margin-bottom:20px;">管理能量，而非時間。</h2>
        <p class="reveal" style="text-align:center; color:var(--text-muted); font-size:22px; max-width:600px; margin:0 auto;">
            打破傳統排程迷思。透過 AI 偵測心理與能量狀態，將複雜任務拆解為小步驟 [cite: 29, 37]。
        </p>
        <div class="grid">
            <div class="feature-card reveal">
                <h3>AI 降阻引擎</h3>
                <p>內建工具將龐雜任務具體拆解，徹底根除拖延症的源頭 [cite: 49]。</p>
            </div>
            <div class="feature-card reveal">
                <h3>能量導向匹配</h3>
                <p>用自身狀態匹配任務，真正解決有時間卻沒精力執行的痛點 [cite: 47]。</p>
            </div>
            <div class="feature-card reveal">
                <h3>動態節奏配比</h3>
                <p>主動調控執行與休息時間，避免陷入低效工作的泥沼 [cite: 50]。</p>
            </div>
        </div>
    </section>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
